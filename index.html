<!doctype html>
<html lang="en">
  <head>

    <link

          <input type="text" id="search" placeholder="Search City..." />

    <main>
      <div class="main">
        <div class="content">
          <div id="result"></div>
          <div id="temp"></div>
        </div>

        <script src="script.js"></script>

        <div class="side">
          <h3><a href="#">Home</a></h3>
          <h3><a href="About.html">About Us</a></h3>
          <h3><a href="Contact.html">Contact Us</a></h3>
