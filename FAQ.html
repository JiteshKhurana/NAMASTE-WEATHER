<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAQ</title>
    <link rel="stylesheet" href="FAQ.css" />
  </head>
  <body>
    <div class="FAQ">
      <h3>FAQ(Frequently Asked Questions)</h3>

      <p>1. How accurate is the weather data?</p>
      <select class="q1" id="q1">
        <option
          value="The weather data is provided by Open-Meteo API and is generally accurate,
      but slight variations may occur."
        >
          The weather data is provided by Open-Meteo API and is generally
          accurate, but slight variations may occur.
        </option>
      </select>

      <p>2. Which API does this app use?</p>
      <select class="q2" id="q2">
        <option value="hi">
          This app uses the Open-Meteo API to fetch real-time weather
          information.
        </option>
      </select>
      <p>3. How often is the data updated?</p>
      <select class="q3" id="q3">
        <option value="hi">
          The data updates every time you search for a city.
        </option>
      </select>

      <p>4. Can I search for any city?</p>
      <select class="q3" id="q3">
        <option value="hi">
          Yes, you can search for most cities worldwide.
        </option>
      </select>
      <p>5. Why is my city not showing?</p>
      <select class="q3" id="q3">
        <option value="hi">
          If the city name is incorrect or not available in the API database,
          results may not appear.
        </option>
      </select>
      <p>6. What units are used in this app?</p>
      <select class="q3" id="q3">
        <option value="hi">
          Temperature is shown in °C and wind speed in km/h.
        </option>
      </select>

      <p>7. Does this app store my data?</p>
      <select class="q3" id="q3">
        <option value="hi">
          No, this app does not store any personal data.
        </option>
      </select>
    </div>
  </body>
</html>
